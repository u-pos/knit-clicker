<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>ニット帽クリッカー</title>

<style>
/* ===== 基本 ===== */
html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;                 /* スクロール禁止 */
  background:#000;
  font-family:sans-serif;
  -webkit-user-select:none;
  user-select:none;
  touch-action: manipulation;      /* ダブルタップズーム抑制 */
}

/* ズーム/ジェスチャ抑制（追加保険） */
*{
  touch-action: manipulation;
}

/* ===== 共通コンテナ ===== */
#game{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
}

/* 背景 */
.bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

/* ===== ステータス（左上） ===== */
.panel{
  position:absolute;
  top:10px;
  left:10px;
  z-index:10;
  background:rgba(0,0,0,0.6);
  padding:10px;
  color:#fff;
  font-size:16px;
  border-radius:8px;
}

/* コントロール（転生など） */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px;
  margin-top:6px;
}
.ctrl{
  background:#222;
  color:#fff;
  text-align:center;
  padding:6px;
  font-size:12px;
}
.ctrl:active{
  background:#a00;
}

/* ===== 納品ボタン ===== */
.deliver{
  position:absolute;
  top:10px;
  right:10px;
  z-index:10;
}
.deliver img{
  width:140px;
}

/* ===== 帽子 ===== */
.hat{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:220px;
  transition:0.1s;
  z-index:5;
}

/* ===== 下ボタン（スマホ） ===== */
.bottom{
  position:absolute;
  bottom:0;
  width:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  padding:6px;
  z-index:10;
}
.btn img{
  width:100%;
}

/* ===== ポップ ===== */
.pop{
  position:absolute;
  color:#fff;
  font-size:18px;
  animation:pop 0.8s forwards;
  z-index:20;
}
@keyframes pop{
  100%{opacity:0; transform:translateY(-60px);}
}

/* ===== PC時（横UIに戻す） ===== */
@media(min-width:769px){
  #game{
    width:1280px;
    height:720px;
    margin:auto;
  }

  .hat{
    width:300px;
  }

  .bottom{
    grid-template-columns:repeat(4,1fr);
  }

  .deliver img{
    width:260px;
  }
}
</style>
</head>

<body>

<div id="game">

<img src="bg.jpg" class="bg">

<!-- ステータス -->
<div class="panel">
  <div id="money"></div>
  <div>ニット帽：<span id="hatCount"></span></div>
  <div>商品単価：<span id="price"></span>円</div>
  <div>パート：<span id="worker"></span>人（LV<span id="workerLv"></span>）</div>
  <div>工場数：<span id="factory"></span>棟</div>
  <div>転生：<span id="soul"></span>回</div>

  <div class="grid">
    <div class="ctrl" onclick="confirmPrestige()">転生</div>
    <div class="ctrl" onclick="saveAndPause()">中断</div>
    <div class="ctrl" onclick="resumeGame()">再開</div>
    <div class="ctrl" onclick="confirmReset()">廃業</div>
  </div>
</div>

<!-- 納品 -->
<div class="deliver" onclick="sellAll()">
  <img src="btn_deliver2.png">
</div>

<!-- 帽子 -->
<img src="knit-hat-v2.png" class="hat" id="hatBtn">

<!-- 下ボタン -->
<div class="bottom">
  <div class="btn" onclick="hire()"><img src="btn_worker2.png"></div>
  <div class="btn" onclick="upgrade()"><img src="btn_upgrade2.png"></div>
  <div class="btn" onclick="train()"><img src="btn_training2.png"></div>
  <div class="btn" onclick="build()"><img src="btn_factory2.png"></div>
</div>

</div>

<script>

/* ===== 音 ===== */
const bgm = new Audio("bgm.mp3");
bgm.loop = true;
bgm.volume = 0.3;

function play(src){
  new Audio(src).play();
}

/* 初回タップでBGM */
let bgmStarted=false;
document.addEventListener("click",()=>{
  if(!bgmStarted){
    bgm.play().catch(()=>{});
    bgmStarted=true;
  }
},{once:true});

/* ===== 状態 ===== */
let money=0,hats=0,price=100,worker=0,factory=0,workerLv=1,soul=0;
let autoBuffer=0,paused=false;

/* ===== 表示 ===== */
function formatMoney(n){
 if(n>=1e8) return (n/1e8).toFixed(2)+"億円";
 if(n>=1e4) return (n/1e4).toFixed(2)+"万円";
 return Math.floor(n)+"円";
}

function update(){
 document.getElementById("money").innerText="所持金："+formatMoney(money);
 document.getElementById("hatCount").innerText=Math.floor(hats);
 document.getElementById("price").innerText=price;
 document.getElementById("worker").innerText=worker;
 document.getElementById("workerLv").innerText=workerLv;
 document.getElementById("factory").innerText=factory;
 document.getElementById("soul").innerText=soul;
}

/* ===== エフェクト ===== */
const hatBtn=document.getElementById("hatBtn");

function pop(val){
 const r=hatBtn.getBoundingClientRect();
 const p=document.createElement("div");
 p.className="pop";
 p.innerText="+"+val;
 p.style.left=(r.left+r.width*0.7)+"px";
 p.style.top=(r.top+r.height*0.2)+"px";
 document.body.appendChild(p);
 setTimeout(()=>p.remove(),800);
}

function hatEffect(val){
 hatBtn.style.transform="translate(-50%,-50%) scale(0.9)";
 setTimeout(()=>hatBtn.style.transform="translate(-50%,-50%) scale(1)",80);
 pop(val);
}

/* ===== クリック ===== */
hatBtn.onclick=()=>{
 if(paused)return;
 hats++;
 play("click.mp3");
 hatEffect(1);
 update();
};

/* ===== 自動 ===== */
setInterval(()=>{
 if(paused)return;
 let g=(worker*0.05*workerLv)+(factory*1.0);
 hats+=g;
 autoBuffer+=g;

 let t=Math.floor(autoBuffer);
 if(t>=1){
  autoBuffer-=t;
  hatEffect(t);
 }
 update();
},500);

/* ===== 納品 ===== */
function sellAll(){
 if(hats>0){
  money+=Math.floor(hats*price);
  hats=0;
  play("money.mp3");
  update();
 }
}

/* ===== 強化 ===== */
function upgrade(){
 if(money>=500){
  money-=500;
  price+=10;
  play("up.mp3");
 }
}
function hire(){
 if(money>=100){
  money-=100;
  worker++;
  play("up.mp3");
 }
}
function train(){
 if(money>=2000){
  money-=2000;
  workerLv++;
  play("up.mp3");
 }
}
function build(){
 if(money>=5000){
  money-=5000;
  factory++;
  play("up.mp3");
 }
}

/* ===== 転生 ===== */
function confirmPrestige(){
 play("click.mp3");
 if(money<100000000){
  alert("1億円未満では転生できません");
 }else{
  if(confirm("転生しますか？")){
    soul++;
    money=0; hats=0; price=100; worker=0; factory=0; workerLv=1;
    update();
  }
 }
}

/* ===== 廃業 ===== */
function confirmReset(){
 play("click.mp3");
 if(confirm("廃業しますか？")){
  location.reload();
 }
}

/* ===== 中断 ===== */
function saveAndPause(){
 paused=true;
 bgm.pause();
}

/* ===== 再開 ===== */
function resumeGame(){
 paused=false;
 bgm.play().catch(()=>{});
}

/* ===== ライフサイクル ===== */
document.addEventListener("visibilitychange",()=>paused=document.hidden);
window.addEventListener("blur",()=>paused=true);
window.addEventListener("focus",()=>paused=false);

/* 初期 */
update();

</script>

</body>
</html>
