<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ニット帽クリッカー</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'DotGothic16';}
#game{width:1280px;height:720px;position:relative;}
.bg{position:absolute;width:100%;height:100%;}

/* UI */
.panel{position:absolute;top:20px;left:20px;width:340px;padding:18px;background:rgba(0,0,0,0.85);border-radius:12px;}
.panel-text{color:#ffd700;font-size:26px;line-height:2.0;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}
.ctrl{background:#222;color:#fff;padding:10px;text-align:center;cursor:pointer;}
.ctrl:active{background:#a00000;transform:scale(0.95);}

.hat{position:absolute;top:150px;left:540px;width:360px;cursor:pointer;transition:0.1s;}

.deliver{position:absolute;top:20px;right:40px;width:260px;cursor:pointer;}
.deliver img{width:100%;}

/* ★ボタン詰め＆統一 */
.bottom{
 position:absolute;
 bottom:0;
 width:100%;
 display:flex;
 justify-content:center;
 gap:5px; /* ←詰め */
}

.btn{
 width:240px;
 height:180px;
 position:relative;
 cursor:pointer;
}

.btn img{
 width:100%;
 height:100%;
 object-fit:contain; /* ←サイズ統一 */
}

/* ★コスト見やすく */
.price{
 position:absolute;
 bottom:8px;
 left:50%;
 transform:translateX(-50%);
 color:#fff;
 font-size:22px;
 text-shadow:
  -2px -2px 0 #000,
   2px -2px 0 #000,
  -2px  2px 0 #000,
   2px  2px 0 #000;
}

/* エフェクト */
.pop{position:absolute;color:#fff;font-size:28px;animation:pop 0.8s forwards;}
@keyframes pop{100%{opacity:0;transform:translateY(-60px);}}

/* 音量 */
#volumeBox{position:absolute;top:130px;right:50px;color:#fff;}
</style>
</head>

<body>

<div id="game">
<img src="bg.jpg" class="bg">

<div class="panel">
<div class="panel-text">
<div id="money"></div>
<div>ニット帽：<span id="hat"></span>個</div>
<div>商品単価：<span id="price"></span>円</div>
<div>パート：<span id="worker"></span>人（LV<span id="workerLv"></span>）</div>
<div>工場数：<span id="factory"></span>棟</div>
<div>転生：<span id="soul"></span>回</div>
</div>

<div class="grid">
<div class="ctrl" onclick="confirmPrestige()">転生</div>
<div class="ctrl" onclick="saveAndPause()">保存</div>
<div class="ctrl" onclick="resumeGame()">再開</div>
<div class="ctrl" onclick="confirmReset()">廃業</div>
</div>
</div>

<img src="knit-hat-v2.png" class="hat" id="hatBtn">

<div class="deliver" onclick="sellAll(this)">
<img src="btn_deliver2.png">
</div>

<div id="volumeBox">
🔊 <input type="range" id="volumeSlider" min="0" max="100" value="30">
</div>

<div class="bottom">
<div class="btn" onclick="hire(this)"><img src="btn_worker2.png"><div class="price" id="workerCost"></div></div>
<div class="btn" onclick="upgrade(this)"><img src="btn_upgrade2.png"><div class="price" id="priceCost"></div></div>
<div class="btn" onclick="train(this)"><img src="btn_training2.png"><div class="price" id="trainCost"></div></div>
<div class="btn" onclick="build(this)"><img src="btn_factory2.png"><div class="price" id="factoryCost"></div></div>
<div class="btn" onclick="upgradeClick(this)"><img src="btn_click3.png"><div class="price" id="clickCost"></div></div>
</div>

</div>

<script>
let paused=false; // ★ここが原因だった

let money=0,hats=0,price=100,worker=0,factory=0,workerLv=1,soul=0;
let upgradeCount=0,clickPower=1,clickLevel=0;

const hatBtn=document.getElementById("hatBtn");

/* クリック */
hatBtn.onclick=()=>{
 if(paused)return;
 hats+=clickPower;
 hatBtn.style.transform="scale(0.9)";
 setTimeout(()=>hatBtn.style.transform="scale(1)",80);
 update();
};

/* 強化 */
function upgradeClick(el){
 let cost=Math.floor(10000*Math.pow(2.2,clickLevel));
 if(money>=cost){
  money-=cost;
  clickPower++;
  clickLevel++;
 }
 update();
}

/* ダミー（既存維持） */
function hire(){}
function upgrade(){}
function train(){}
function build(){}
function sellAll(){}

/* 表示 */
function formatMoney(n){
 n=Math.floor(n);
 if(n>=1e8)return(n/1e6/100)+"億円";
 if(n>=1e4)return(n/100/100)+"万円";
 return n+"円";
}

function update(){
 document.getElementById("money").innerText="所持金："+formatMoney(money);
 document.getElementById("hat").innerText=hats;
 document.getElementById("price").innerText=price;
 document.getElementById("worker").innerText=worker;
 document.getElementById("workerLv").innerText=workerLv;
 document.getElementById("factory").innerText=factory;
 document.getElementById("soul").innerText=soul;

 document.getElementById("clickCost").innerText=formatMoney(Math.floor(10000*Math.pow(2.2,clickLevel)));
}

update();
</script>

</body>
</html>
