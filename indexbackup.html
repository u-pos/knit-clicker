<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ニット帽クリッカー</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'DotGothic16';}
#game{width:1280px;height:720px;position:relative;}
.bg{position:absolute;width:100%;height:100%;}

/* 音量 */
#volumeBox{position:absolute;top:130px;right:50px;color:#fff;font-size:20px;}
#volumeSlider{width:150px;}

/* 左UI */
.panel{position:absolute;top:20px;left:20px;width:340px;padding:18px;background:rgba(0,0,0,0.85);border-radius:12px;}
.panel-text{color:#ffd700;font-size:26px;line-height:2.0;}

/* 上ボタン */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}
.ctrl{background:#222;color:#fff;padding:10px;text-align:center;cursor:pointer;}
.ctrl:active{background:#a00000;transform:scale(0.95);}

/* 帽子 */
.hat{position:absolute;top:150px;left:540px;width:360px;cursor:pointer;transition:0.1s;}

/* 納品 */
.deliver{position:absolute;top:20px;right:40px;width:260px;cursor:pointer;}
.deliver img{width:100%;}

/* 下ボタン（5個対応） */
.bottom{position:absolute;bottom:0;width:100%;height:200px;}
.btn{position:absolute;width:240px;height:180px;cursor:pointer;}
.btn:nth-child(1){left:20px;}
.btn:nth-child(2){left:270px;}
.btn:nth-child(3){left:520px;}
.btn:nth-child(4){left:770px;}
.btn:nth-child(5){left:1020px;}

.btn img{position:absolute;bottom:0;width:100%;}
.price{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);color:#fff;font-size:22px;}

/* エフェクト */
.pop{position:absolute;color:#fff;font-size:28px;animation:pop 0.8s forwards;}
@keyframes pop{100%{opacity:0;transform:translateY(-60px);}}
</style>
</head>

<body>

<div id="game">
<img src="bg.jpg" class="bg">

<div class="panel">
<div class="panel-text">
<div id="money"></div>
<div>ニット帽：<span id="hat"></span>個</div>
<div>商品単価：<span id="price"></span>円</div>
<div>パート：<span id="worker"></span>人（LV<span id="workerLv"></span>）</div>
<div>工場数：<span id="factory"></span>棟</div>
<div>転生：<span id="soul"></span>回</div>
</div>

<div class="grid">
<div class="ctrl" onclick="confirmPrestige()">転生する</div>
<div class="ctrl" onclick="saveAndPause()">保存して終了</div>
<div class="ctrl" onclick="resumeGame()">再開する</div>
<div class="ctrl" onclick="confirmReset()">廃業する</div>
</div>
</div>

<img src="knit-hat-v2.png" class="hat" id="hatBtn">

<div class="deliver" onclick="sellAll(this)">
<img src="btn_deliver2.png">
</div>

<div id="volumeBox">
🔊 <input type="range" id="volumeSlider" min="0" max="100" value="30">
</div>

<div class="bottom">

<div class="btn" onclick="hire(this)">
<img src="btn_worker2.png">
<div class="price" id="workerCost"></div>
</div>

<div class="btn" onclick="upgrade(this)">
<img src="btn_upgrade2.png">
<div class="price" id="priceCost"></div>
</div>

<div class="btn" onclick="train(this)">
<img src="btn_training2.png">
<div class="price" id="trainCost"></div>
</div>

<div class="btn" onclick="build(this)">
<img src="btn_factory2.png">
<div class="price" id="factoryCost"></div>
</div>

<!-- ★追加 -->
<div class="btn" onclick="upgradeClick(this)">
<img src="btn_click3.png">
<div class="price" id="clickCost"></div>
</div>

</div>

</div>

<script>
const SAVE_KEY="knitSave";
const MAX=99;

/* 音 */
const clickSound=new Audio("click.mp3");
const upSound=new Audio("up.mp3");
const moneySound=new Audio("money.mp3");
const bgm=new Audio("bgm.mp3");
bgm.loop=true;bgm.volume=0.3;

document.addEventListener("click",()=>{bgm.play().catch(()=>{});},{once:true});

/* 状態 */
let money=0,hats=0,price=100,worker=0,factory=0,workerLv=1,soul=0;
let upgradeCount=0,autoBuffer=0,paused=true;
let clickPower=1,clickLevel=0;

/* 保存 */
function saveGame(){
 localStorage.setItem(SAVE_KEY,JSON.stringify({money,hats,price,worker,factory,workerLv,soul,upgradeCount,clickPower,clickLevel}));
}
function loadGame(){
 const d=JSON.parse(localStorage.getItem(SAVE_KEY));
 if(!d)return;
 Object.assign(window,d);
 autoBuffer=0;
 paused=true;
}
loadGame();
window.addEventListener("beforeunload",saveGame);

/* 表示 */
function formatMoney(n){
 n=Math.floor(n);
 if(n>=1e16)return(Math.floor(n/1e14)/100)+"京円";
 if(n>=1e12)return(Math.floor(n/1e10)/100)+"兆円";
 if(n>=1e8)return(Math.floor(n/1e6)/100)+"億円";
 if(n>=1e4)return(Math.floor(n/100)/100)+"万円";
 return n+"円";
}
function formatCost(n){
 n=Math.floor(n);
 if(n>=1e8)return(Math.floor(n/1e6)/100)+"億円";
 if(n>=1e4)return(Math.floor(n/100)/100)+"万円";
 return n+"円";
}
function ceil10(n){return Math.ceil(n/10)*10;}

/* エフェクト */
function spawnPop(val){
 const r=hatBtn.getBoundingClientRect();
 const p=document.createElement("div");
 p.className="pop";
 p.innerText="+"+val;
 p.style.left=(r.left+r.width*0.7)+"px";
 p.style.top=(r.top+r.height*0.1)+"px";
 document.body.appendChild(p);
 setTimeout(()=>p.remove(),800);
}
function hatEffect(val){
 spawnPop(val);
 hatBtn.style.transform="scale(0.9)";
 setTimeout(()=>hatBtn.style.transform="scale(1)",80);
}
function pressEffect(el){
 el.style.transform="scale(0.9)";
 setTimeout(()=>el.style.transform="scale(1)",80);
}

/* クリック */
const hatBtn=document.getElementById("hatBtn");
hatBtn.onclick=()=>{
 if(paused)return;
 hats+=clickPower;
 clickSound.cloneNode().play();
 hatEffect(clickPower);
 update();
};

/* 自動 */
setInterval(()=>{
 if(paused)return;
 let g=(worker*0.05*workerLv)+(factory*1.0);
 hats+=g;
 autoBuffer+=g;
 let t=Math.floor(autoBuffer);
 if(t>=1){autoBuffer-=t;hatEffect(t);}
 update();
},500);

/* 納品 */
function sellAll(el){
 if(paused)return;
 if(hats>0){
  money+=Math.floor(hats*price);
  hats=0;
  moneySound.cloneNode().play();
  pressEffect(el);
 }
 update();
}

/* 自身強化 */
function getClickCost(){
 return Math.floor(10000*Math.pow(2.2,clickLevel));
}
function upgradeClick(el){
 let cost=getClickCost();
 if(money>=cost){
  money-=cost;
  clickPower++;
  clickLevel++;
  upSound.cloneNode().play();
  pressEffect(el);
 }
 update();
}

/* 既存強化 */
function upgrade(el){let c=ceil10(500*Math.pow(1.25,upgradeCount));if(money>=c){money-=c;price+=10;upgradeCount++;upSound.cloneNode().play();pressEffect(el);}}
function hire(el){let c=ceil10(100*Math.pow(1.5,worker));if(money>=c&&worker<MAX){money-=c;worker++;upSound.cloneNode().play();pressEffect(el);}}
function train(el){let c=ceil10(2000*Math.pow(2.2,workerLv-1));if(money>=c&&workerLv<MAX){money-=c;workerLv++;upSound.cloneNode().play();pressEffect(el);}}
function build(el){let c=ceil10(5000*Math.pow(2,factory));if(money>=c&&factory<MAX){money-=c;factory++;upSound.cloneNode().play();pressEffect(el);}}

/* その他 */
function saveAndPause(){saveGame();paused=true;bgm.pause();}
function resumeGame(){paused=false;bgm.play().catch(()=>{});}
function confirmPrestige(){}
function confirmReset(){localStorage.removeItem(SAVE_KEY);location.reload();}

/* 更新 */
function update(){
 moneyEl.innerText="所持金："+formatMoney(money);
 hatEl.innerText=Math.floor(hats);
 priceEl.innerText=price;
 workerEl.innerText=worker;
 workerLvEl.innerText=workerLv;
 factoryEl.innerText=factory;
 soulEl.innerText=soul;

 priceCost.innerText=formatCost(ceil10(500*Math.pow(1.25,upgradeCount)));
 workerCost.innerText=formatCost(ceil10(100*Math.pow(1.5,worker)));
 trainCost.innerText=formatCost(ceil10(2000*Math.pow(2.2,workerLv-1)));
 factoryCost.innerText=formatCost(ceil10(5000*Math.pow(2,factory)));
 clickCost.innerText=formatCost(getClickCost());
}

update();
</script>
</body>
</html>
