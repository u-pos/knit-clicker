<!-- 変更点だけじゃなく“完全版” -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ニット帽クリッカー</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'DotGothic16';}
#game{width:1280px;height:720px;position:relative;}
.bg{position:absolute;width:100%;height:100%;}

/* UI */
.panel{position:absolute;top:20px;left:20px;width:340px;padding:18px;background:rgba(0,0,0,0.85);border-radius:12px;}
.panel-text{color:#ffd700;font-size:26px;line-height:2.0;}

.hat{position:absolute;top:150px;left:540px;width:360px;cursor:pointer;}

.deliver{position:absolute;top:20px;right:40px;width:260px;cursor:pointer;}
.deliver img{width:100%;}

/* 下ボタン */
.bottom{position:absolute;bottom:0;width:100%;height:200px;}
.btn{position:absolute;width:280px;height:200px;cursor:pointer;}
.btn:nth-child(1){left:40px;}
.btn:nth-child(2){left:360px;}
.btn:nth-child(3){left:680px;}
.btn:nth-child(4){left:1000px;}

.btn img{width:100%;height:100%;object-fit:contain;}

.price{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);color:#fff;font-size:28px;}

/* ★ 自身強化ボタン */
.click-up{
 position:absolute;
 bottom:210px;
 right:40px;
 width:280px;
 height:120px;
 cursor:pointer;
}
.click-up img{width:100%;height:100%;object-fit:contain;}

/* エフェクト */
.pop{position:absolute;color:#fff;font-size:28px;animation:pop 0.8s forwards;}
@keyframes pop{100%{opacity:0;transform:translateY(-60px);}}

</style>
</head>

<body>

<div id="game">
<img src="bg.jpg" class="bg">

<div class="panel">
<div class="panel-text">
<div id="money"></div>
<div>ニット帽：<span id="hat"></span>個</div>
<div>商品単価：<span id="price"></span>円</div>
<div>パート：<span id="worker"></span>人（LV<span id="workerLv"></span>）</div>
<div>工場数：<span id="factory"></span>棟</div>
</div>
</div>

<img src="knit-hat-v2.png" class="hat" id="hatBtn">

<div class="deliver" onclick="sellAll(this)">
<img src="btn_deliver2.png">
</div>

<!-- ★ 自身強化 -->
<div class="click-up" onclick="upgradeClick(this)">
<img src="btn_click3.png">
<div class="price" id="clickCost"></div>
</div>

<div class="bottom">
<div class="btn" onclick="hire(this)"><img src="btn_worker3.png"><div class="price" id="workerCost"></div></div>
<div class="btn" onclick="upgrade(this)"><img src="btn_upgrade3.png"><div class="price" id="priceCost"></div></div>
<div class="btn" onclick="train(this)"><img src="btn_training3.png"><div class="price" id="trainCost"></div></div>
<div class="btn" onclick="build(this)"><img src="btn_factory3.png"><div class="price" id="factoryCost"></div></div>
</div>

</div>

<script>
const MAX=99;

/* ===== 状態 ===== */
let money=0,hats=0,price=100,worker=0,factory=0,workerLv=1;
let upgradeCount=0;
let clickPower=1;
let clickLevel=0;

/* ===== 表示 ===== */
function formatMoney(n){
 n=Math.floor(n);
 if(n>=1e8)return(n/1e8).toFixed(2)+"億円";
 if(n>=1e4)return(n/1e4).toFixed(2)+"万円";
 return n+"円";
}
function ceil10(n){return Math.ceil(n/10)*10;}

/* ===== DOM ===== */
const hatBtn=document.getElementById("hatBtn");
const moneyEl=document.getElementById("money");
const hatEl=document.getElementById("hat");
const priceEl=document.getElementById("price");
const workerEl=document.getElementById("worker");
const workerLvEl=document.getElementById("workerLv");
const factoryEl=document.getElementById("factory");

/* ===== エフェクト ===== */
function spawnPop(val){
 const p=document.createElement("div");
 p.className="pop";
 p.innerText="+"+val;
 p.style.left="600px";
 p.style.top="200px";
 document.body.appendChild(p);
 setTimeout(()=>p.remove(),800);
}

/* ===== クリック ===== */
hatBtn.onclick=()=>{
 hats+=clickPower;
 spawnPop(clickPower);
 update();
};

/* ===== 自動 ===== */
setInterval(()=>{
 let g=(worker*0.05*workerLv)+(factory*1.0);
 hats+=g;
 update();
},500);

/* ===== 納品 ===== */
function sellAll(){
 if(hats>0){
  money+=Math.floor(hats*price);
  hats=0;
 }
 update();
}

/* ===== 自身強化（クリック強化） ===== */
function getClickCost(){
 return Math.floor(10000*Math.pow(2.2,clickLevel));
}

function upgradeClick(el){
 let cost=getClickCost();

 if(money>=cost){
  money-=cost;
  clickPower++;
  clickLevel++;
  spawnPop("クリック+"+clickPower);
 }
 update();
}

/* ===== 他 ===== */
function upgrade(el){
 let cost=ceil10(500*Math.pow(1.25,upgradeCount));
 if(money>=cost){
  money-=cost;price+=10;upgradeCount++;
 }
}
function hire(el){
 let c=ceil10(100*Math.pow(1.5,worker));
 if(money>=c && worker<MAX){
  money-=c;worker++;
 }
}
function train(el){
 let c=ceil10(2000*Math.pow(2.2,workerLv-1));
 if(money>=c && workerLv<MAX){
  money-=c;workerLv++;
 }
}
function build(el){
 let c=ceil10(5000*Math.pow(2,factory));
 if(money>=c && factory<MAX){
  money-=c;factory++;
 }
}

/* ===== 更新 ===== */
function update(){
 moneyEl.innerText="所持金："+formatMoney(money);
 hatEl.innerText=Math.floor(hats);
 priceEl.innerText=price;
 workerEl.innerText=worker;
 workerLvEl.innerText=workerLv;
 factoryEl.innerText=factory;

 document.getElementById("priceCost").innerText=ceil10(500*Math.pow(1.25,upgradeCount))+"円";
 document.getElementById("workerCost").innerText=ceil10(100*Math.pow(1.5,worker))+"円";
 document.getElementById("trainCost").innerText=ceil10(2000*Math.pow(2.2,workerLv-1))+"円";
 document.getElementById("factoryCost").innerText=ceil10(5000*Math.pow(2,factory))+"円";

 document.getElementById("clickCost").innerText=getClickCost()+"円";
}

update();
</script>

</body>
</html>
