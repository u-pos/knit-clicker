<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ニット帽クリッカー</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:sans-serif;
  touch-action: manipulation;
  overflow:hidden;
}

/* ズーム防止 */
*{
  touch-action: manipulation;
}

/* ===== スマホUI ===== */
#mobile-ui{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  color:#fff;
}

/* 上 */
.top{
  padding:10px;
  font-size:18px;
  line-height:1.6;
}

/* 中央 */
.center{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.hat{
  width:200px;
  transition:0.1s;
}

/* 下 */
.bottom{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:10px;
}

.btn img{
  width:100%;
}

/* ポップ */
.pop{
  position:absolute;
  color:#fff;
  font-size:20px;
  animation:pop 0.8s forwards;
}
@keyframes pop{
  100%{opacity:0;transform:translateY(-50px);}
}
</style>
</head>

<body>

<div id="mobile-ui">

<div class="top">
  <div id="money"></div>
  <div>ニット帽：<span id="hatCount"></span></div>
  <div>商品単価：<span id="price"></span>円</div>
  <div>パート：<span id="worker"></span>人（LV<span id="workerLv"></span>）</div>
  <div>工場数：<span id="factory"></span>棟</div>
  <div>転生：<span id="soul"></span>回</div>
</div>

<div class="center">
  <img src="knit-hat-v2.png" class="hat" id="hatBtn">
</div>

<div class="bottom">
  <div class="btn" onclick="hire(this)"><img src="btn_worker2.png"></div>
  <div class="btn" onclick="upgrade(this)"><img src="btn_upgrade2.png"></div>
  <div class="btn" onclick="train(this)"><img src="btn_training2.png"></div>
  <div class="btn" onclick="build(this)"><img src="btn_factory2.png"></div>
</div>

</div>

<script>

/* ===== 音 ===== */
function play(src){
  new Audio(src).play();
}

/* ===== 状態 ===== */
let money=0,hats=0,price=100,worker=0,factory=0,workerLv=1,soul=0;
let autoBuffer=0,paused=false;

/* ===== DOM ===== */
const hatBtn=document.getElementById("hatBtn");

/* ===== 表示 ===== */
function formatMoney(n){
 if(n>=1e8) return (n/1e8).toFixed(2)+"億円";
 if(n>=1e4) return (n/1e4).toFixed(2)+"万円";
 return Math.floor(n)+"円";
}

function update(){
 document.getElementById("money").innerText="所持金："+formatMoney(money);
 document.getElementById("hatCount").innerText=Math.floor(hats);
 document.getElementById("price").innerText=price;
 document.getElementById("worker").innerText=worker;
 document.getElementById("workerLv").innerText=workerLv;
 document.getElementById("factory").innerText=factory;
 document.getElementById("soul").innerText=soul;
}

/* ===== エフェクト ===== */
function pop(val){
 const r=hatBtn.getBoundingClientRect();
 const p=document.createElement("div");
 p.className="pop";
 p.innerText="+"+val;
 p.style.left=(r.left+r.width*0.7)+"px";
 p.style.top=(r.top+r.height*0.2)+"px";
 document.body.appendChild(p);
 setTimeout(()=>p.remove(),800);
}

function hatEffect(val){
 hatBtn.style.transform="scale(0.9)";
 setTimeout(()=>hatBtn.style.transform="scale(1)",80);
 pop(val);
}

/* ===== クリック ===== */
hatBtn.onclick=()=>{
 if(paused)return;
 hats++;
 play("click.mp3");
 hatEffect(1);
 update();
};

/* ===== 自動 ===== */
setInterval(()=>{
 if(paused)return;
 let g=(worker*0.05*workerLv)+(factory*1.0);
 hats+=g;
 autoBuffer+=g;

 let t=Math.floor(autoBuffer);
 if(t>=1){
  autoBuffer-=t;
  hatEffect(t);
 }
 update();
},500);

/* ===== 納品 ===== */
function sellAll(){
 if(hats>0){
  money+=Math.floor(hats*price);
  hats=0;
  play("money.mp3");
  update();
 }
}

/* ===== 強化 ===== */
function upgrade(el){
 if(money>=500){
  money-=500;
  price+=10;
  play("up.mp3");
 }
}
function hire(el){
 if(money>=100){
  money-=100;
  worker++;
  play("up.mp3");
 }
}
function train(el){
 if(money>=2000){
  money-=2000;
  workerLv++;
  play("up.mp3");
 }
}
function build(el){
 if(money>=5000){
  money-=5000;
  factory++;
  play("up.mp3");
 }
}

/* ===== ライフサイクル ===== */
document.addEventListener("visibilitychange",()=>paused=document.hidden);
window.addEventListener("blur",()=>paused=true);
window.addEventListener("focus",()=>paused=false);

/* 初期 */
update();

</script>

</body>
</html>
