<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニット帽クリッカー</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:sans-serif;
  overflow:hidden;
}

/* ===== 共通 ===== */
.hidden{display:none;}
button{cursor:pointer}

/* ===== PC UI ===== */
#pc-ui{
  width:1280px;
  height:720px;
  margin:auto;
  position:relative;
  background:#111;
  color:#fff;
}

.pc-panel{
  position:absolute;
  left:20px;
  top:20px;
}

.pc-hat{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:200px;
}

.pc-bottom{
  position:absolute;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
}

/* ===== MOBILE UI ===== */
#mobile-ui{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  color:#fff;
}

/* 上：ステータス */
.m-top{
  padding:10px;
  font-size:18px;
}

/* 中央：帽子 */
.m-center{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.m-hat{
  width:180px;
}

/* 下：ボタン */
.m-bottom{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:10px;
}

.m-btn{
  background:#333;
  padding:15px;
  text-align:center;
}

/* ポップ */
.pop{
  position:absolute;
  color:#fff;
  animation:pop 0.8s forwards;
}
@keyframes pop{
  100%{opacity:0;transform:translateY(-60px);}
}
</style>
</head>

<body>

<!-- PC UI -->
<div id="pc-ui">
  <div class="pc-panel">
    <div id="pc-money"></div>
    <div>ニット帽：<span id="pc-hat-count"></span></div>
  </div>

  <img src="knit-hat-v2.png" class="pc-hat" id="pc-hat">

  <div class="pc-bottom">
    <button onclick="upgrade()">強化</button>
    <button onclick="sellAll()">納品</button>
  </div>
</div>

<!-- MOBILE UI -->
<div id="mobile-ui">
  <div class="m-top">
    <div id="m-money"></div>
    <div>ニット帽：<span id="m-hat-count"></span></div>
  </div>

  <div class="m-center">
    <img src="knit-hat-v2.png" class="m-hat" id="m-hat">
  </div>

  <div class="m-bottom">
    <div class="m-btn" onclick="upgrade()">強化</div>
    <div class="m-btn" onclick="sellAll()">納品</div>
  </div>
</div>

<script>

/* ===== 判定 ===== */
const isMobile = window.innerWidth <= 768;
document.getElementById("pc-ui").classList.toggle("hidden", isMobile);
document.getElementById("mobile-ui").classList.toggle("hidden", !isMobile);

/* ===== 状態 ===== */
let money=0;
let hats=0;
let price=100;
let paused=false;

/* ===== DOM ===== */
const pcMoney=document.getElementById("pc-money");
const pcHat=document.getElementById("pc-hat-count");

const mMoney=document.getElementById("m-money");
const mHat=document.getElementById("m-hat-count");

const hatBtn = isMobile ? document.getElementById("m-hat") : document.getElementById("pc-hat");

/* ===== 表示 ===== */
function update(){
  const text="所持金："+money+"円";
  pcMoney.innerText=text;
  mMoney.innerText=text;

  pcHat.innerText=hats;
  mHat.innerText=hats;
}

/* ===== エフェクト ===== */
function pop(val){
  const r=hatBtn.getBoundingClientRect();
  const p=document.createElement("div");
  p.className="pop";
  p.innerText="+"+val;
  p.style.left=r.left+"px";
  p.style.top=r.top+"px";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),800);
}

/* ===== クリック ===== */
hatBtn.onclick=()=>{
  if(paused)return;
  hats++;
  pop(1);
  update();
};

/* ===== 自動 ===== */
setInterval(()=>{
  if(paused)return;
  hats+=1;
  update();
},1000);

/* ===== 納品 ===== */
function sellAll(){
  if(hats>0){
    money+=hats*price;
    hats=0;
    update();
  }
}

/* ===== 強化 ===== */
function upgrade(){
  if(money>=100){
    money-=100;
    price+=10;
    update();
  }
}

/* ===== スマホライフサイクル ===== */
document.addEventListener("visibilitychange",()=>{
  paused=document.hidden;
});
window.addEventListener("blur",()=>paused=true);
window.addEventListener("focus",()=>paused=false);

/* 初期 */
update();

</script>

</body>
</html>
