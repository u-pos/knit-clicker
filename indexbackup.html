<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<title>ニット帽クリッカー</title>

<style>
html,body{
 margin:0;
 height:100%;
 overflow:hidden;
 background:#000;
 font-family:'DotGothic16',sans-serif;
 touch-action:none;
}

/* ズーム完全禁止 */
body{
 overscroll-behavior:none;
}

/* ===== 全体 ===== */
#game{
 position:relative;
 width:100%;
 height:100vh;
 overflow:hidden;
}

/* 背景 */
.bg{
 position:absolute;
 width:100%;
 height:100%;
 object-fit:cover;
}

/* ===== パネル ===== */
.panel{
 position:absolute;
 top:10px;
 left:10px;
 background:rgba(0,0,0,0.6);
 padding:10px;
 color:#fff;
 font-size:16px;
 border-radius:8px;
}

/* ===== 操作ボタン ===== */
.grid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:4px;
 margin-top:5px;
}

.ctrl{
 background:#222;
 color:#fff;
 text-align:center;
 padding:6px;
 font-size:12px;
}

.ctrl:active{
 background:#a00;
}

/* ===== 納品 ===== */
.deliver{
 position:absolute;
 top:10px;
 right:10px;
}

.deliver img{
 width:130px;
}

/* ===== 帽子 ===== */
.hat{
 position:absolute;
 left:50%;
 top:50%;
 transform:translate(-50%,-50%);
 width:220px;
 transition:0.1s;
}

/* ===== 下ボタン ===== */
.bottom{
 position:absolute;
 bottom:0;
 width:100%;
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:6px;
 padding:6px;
}

.btn img{
 width:100%;
}

/* コスト */
.cost{
 text-align:center;
 color:#fff;
 font-size:14px;
 margin-top:-4px;
}

/* ===== ポップ ===== */
.pop{
 position:absolute;
 color:#fff;
 animation:pop 0.8s forwards;
}

@keyframes pop{
 100%{opacity:0;transform:translateY(-60px);}
}

/* ===== PC ===== */
@media(min-width:769px){
 #game{
  width:1280px;
  height:720px;
  margin:auto;
 }

 .bottom{
  grid-template-columns:repeat(4,1fr);
 }

 .deliver img{
  width:260px;
 }

 .hat{
  width:300px;
 }
}
</style>
</head>

<body>

<div id="game">

<img src="bg.jpg" class="bg">

<div class="panel">
 <div id="money"></div>
 <div>ニット帽：<span id="hatCount"></span></div>
 <div>商品単価：<span id="price"></span>円</div>
 <div>パート：<span id="worker"></span>人（LV<span id="workerLv"></span>）</div>
 <div>工場数：<span id="factory"></span>棟</div>
 <div>転生：<span id="soul"></span>回</div>

 <div class="grid">
  <div class="ctrl" onclick="confirmPrestige()">転生する</div>
  <div class="ctrl" onclick="saveAndPause()">保存して中断</div>
  <div class="ctrl" onclick="resumeGame()">再開する</div>
  <div class="ctrl" onclick="confirmReset()">廃業する</div>
 </div>
</div>

<div class="deliver" onclick="sellAll()">
 <img src="btn_deliver2.png">
</div>

<img src="knit-hat-v2.png" class="hat" id="hatBtn">

<div class="bottom">

 <div class="btn" onclick="hire(this)">
  <img src="btn_worker2.png">
  <div class="cost" id="workerCost"></div>
 </div>

 <div class="btn" onclick="upgrade(this)">
  <img src="btn_upgrade2.png">
  <div class="cost" id="priceCost"></div>
 </div>

 <div class="btn" onclick="train(this)">
  <img src="btn_training2.png">
  <div class="cost" id="trainCost"></div>
 </div>

 <div class="btn" onclick="build(this)">
  <img src="btn_factory2.png">
  <div class="cost" id="factoryCost"></div>
 </div>

</div>

</div>

<script>

/* ===== 音 ===== */
function play(src){
 new Audio(src).play();
}

const bgm = new Audio("bgm.mp3");
bgm.loop=true;

document.addEventListener("click",()=>{
 bgm.play().catch(()=>{});
},{once:true});

/* ===== 状態 ===== */
let money=0,hats=0,price=100,worker=0,factory=0,workerLv=1,soul=0;
let upgradeCount=0;

/* ===== 表示 ===== */
function update(){

 document.getElementById("money").innerText="所持金："+money+"円";
 document.getElementById("hatCount").innerText=hats;
 document.getElementById("price").innerText=price;
 document.getElementById("worker").innerText=worker;
 document.getElementById("workerLv").innerText=workerLv;
 document.getElementById("factory").innerText=factory;
 document.getElementById("soul").innerText=soul;

 document.getElementById("priceCost").innerText=500*Math.pow(1.25,upgradeCount)|0+"円";
 document.getElementById("workerCost").innerText=100*Math.pow(1.5,worker)|0+"円";
 document.getElementById("trainCost").innerText=2000*Math.pow(2,workerLv)|0+"円";
 document.getElementById("factoryCost").innerText=5000*Math.pow(2,factory)|0+"円";
}

/* ===== エフェクト ===== */
const hatBtn=document.getElementById("hatBtn");

function press(el){
 el.style.transform="scale(0.9)";
 setTimeout(()=>el.style.transform="scale(1)",80);
}

function hatEffect(){
 hatBtn.style.transform="translate(-50%,-50%) scale(0.9)";
 setTimeout(()=>hatBtn.style.transform="translate(-50%,-50%) scale(1)",80);
}

/* ===== クリック ===== */
hatBtn.onclick=()=>{
 hats++;
 play("click.mp3");
 hatEffect();
 update();
};

/* ===== 納品 ===== */
function sellAll(){
 if(hats>0){
  money+=hats*price;
  hats=0;
  play("money.mp3");
 }
 update();
}

/* ===== 強化 ===== */
function upgrade(el){
 let cost=500*Math.pow(1.25,upgradeCount)|0;
 if(money>=cost){
  money-=cost;
  price+=10;
  upgradeCount++;
  play("up.mp3");
  press(el);
 }
}

function hire(el){
 let cost=100*Math.pow(1.5,worker)|0;
 if(money>=cost){
  money-=cost;
  worker++;
  play("up.mp3");
  press(el);
 }
}

function train(el){
 let cost=2000*Math.pow(2,workerLv)|0;
 if(money>=cost){
  money-=cost;
  workerLv++;
  play("up.mp3");
  press(el);
 }
}

function build(el){
 let cost=5000*Math.pow(2,factory)|0;
 if(money>=cost){
  money-=cost;
  factory++;
  play("up.mp3");
  press(el);
 }
}

/* ===== 初期 ===== */
update();

/* ===== ズーム完全防止 ===== */
document.addEventListener('touchmove', e => e.preventDefault(), { passive:false });

</script>

</body>
</html>
