<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ニット帽クリッカー</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'DotGothic16';}
#game{width:1280px;height:720px;position:relative;}
.bg{position:absolute;width:100%;height:100%;}

/* 帽子 */
.hat{
 position:absolute;
 top:150px;
 left:540px;
 width:360px;
 cursor:pointer;
 transition:0.08s;
}

/* 下ボタン */
.bottom{
 position:absolute;
 bottom:0;
 width:100%;
 display:flex;
 justify-content:space-around;
}

.btn{
 width:220px;
 height:160px;
 position:relative;
 cursor:pointer;
}

.btn img{
 width:100%;
 height:100%;
 object-fit:contain;
}

/* 価格 */
.price{
 position:absolute;
 bottom:8px;
 left:50%;
 transform:translateX(-50%);
 color:#fff;
 font-size:22px;
}

/* ポップ */
.pop{
 position:absolute;
 color:#fff;
 font-size:26px;
 pointer-events:none;
 animation:pop 0.8s forwards;
}
@keyframes pop{
 100%{opacity:0;transform:translateY(-60px);}
}
</style>
</head>

<body>

<div id="game">
<img src="bg.jpg" class="bg">

<img src="knit-hat-v2.png" class="hat" id="hatBtn">

<div class="bottom">
<div class="btn" onclick="hire(this)"><img src="btn_worker3.png"><div class="price" id="workerCost"></div></div>
<div class="btn" onclick="upgrade(this)"><img src="btn_upgrade3.png"><div class="price" id="priceCost"></div></div>
<div class="btn" onclick="train(this)"><img src="btn_training3.png"><div class="price" id="trainCost"></div></div>
<div class="btn" onclick="build(this)"><img src="btn_factory3.png"><div class="price" id="factoryCost"></div></div>
<div class="btn" onclick="upgradeClick(this)"><img src="btn_click3.png"><div class="price" id="clickCost"></div></div>
</div>

</div>

<script>

/* ===== 状態 ===== */
let money=0,hats=0,price=100,worker=0,factory=0,workerLv=1;
let clickPower=1,clickLevel=0;

/* ===== 金額フォーマット（修正済み） */
function formatMoney(n){
 n=Math.floor(n);
 if(n>=1e12) return (Math.floor(n/1e10)/100)+"兆円";
 if(n>=1e8) return (Math.floor(n/1e6)/100)+"億円";
 if(n>=1e4) return (Math.floor(n/100)/100)+"万円";
 return n+"円";
}

/* ===== 帽子クリック ===== */
const hatBtn=document.getElementById("hatBtn");

hatBtn.onclick=()=>{
 hats+=clickPower;

 // ★ 拡大縮小
 hatBtn.style.transform="scale(0.9)";
 setTimeout(()=>hatBtn.style.transform="scale(1)",80);

 spawnPop(clickPower);

 update();
};

/* ===== ポップ位置修正 ===== */
function spawnPop(val){
 const rect=hatBtn.getBoundingClientRect();

 const p=document.createElement("div");
 p.className="pop";
 p.innerText="+"+val;

 p.style.left=(rect.right - 40)+"px";
 p.style.top=(rect.top + 10)+"px";

 document.body.appendChild(p);
 setTimeout(()=>p.remove(),800);
}

/* ===== コスト ===== */
function getClickCost(){
 return Math.floor(10000*Math.pow(2.2,clickLevel));
}

/* ===== 強化 ===== */
function upgradeClick(el){
 let cost=getClickCost();
 if(money>=cost){
  money-=cost;
  clickPower++;
  clickLevel++;
 }
 update();
}

function hire(){}
function upgrade(){}
function train(){}
function build(){}

/* ===== 更新 ===== */
function update(){
 document.getElementById("clickCost").innerText=formatMoney(getClickCost());
}

update();

</script>

</body>
</html>
