<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ニット帽クリッカー</title>

<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'DotGothic16', sans-serif;
}

#game{
  width:1280px;
  height:720px;
  position:relative;
  overflow:hidden;
}

.bg{ position:absolute; width:100%; height:100%; }

/* ===== 左 ===== */
.panel{
  position:absolute;
  top:20px;
  left:20px;
  width:300px;
  padding:18px;
  background:rgba(0,0,0,0.85);
  border:2px solid #666;
  border-radius:12px;
}

.panel-text{
  color:#ffd700;
  font-size:22px;
  line-height:2.3;
}

/* 保存 */
.save{
  margin-top:15px;
  background:#222;
  color:#fff;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

/* ===== ニット ===== */
.hat{
  position:absolute;
  top:170px;
  left:540px;
  width:360px;
  cursor:pointer;
  transition:transform 0.1s;
}

/* ===== エフェクト ===== */
.pop{
  position:absolute;
  color:#fff;
  font-size:28px;
  font-weight:bold;
  pointer-events:none;
  animation:popAnim 0.8s forwards;
}
@keyframes popAnim{
  0%{opacity:1; transform:translateY(0);}
  100%{opacity:0; transform:translateY(-60px);}
}

.spark{
  position:absolute;
  width:40px;
  height:40px;
  background:radial-gradient(circle,#fff,#ffd700,transparent);
  border-radius:50%;
  animation:sparkle 0.6s forwards;
}
@keyframes sparkle{
  0%{opacity:1; transform:scale(0.5);}
  100%{opacity:0; transform:scale(1.5);}
}

/* ===== 納品 ===== */
.deliver{
  position:absolute;
  top:20px;
  right:40px;
  width:260px;
}
.deliver img{ width:100%; }

/* ===== 下ボタン（ここ修正） ===== */
.bottom{
  position:absolute;
  bottom:0;
  width:100%;
  height:200px; /* ←これ重要 */
}

/* ボタン */
.btn{
  position:absolute;
  width:280px;
  height:200px;
  position:relative; /* ←priceの基準 */
}

.btn:nth-child(1){ left:40px; }
.btn:nth-child(2){ left:360px; }
.btn:nth-child(3){ left:680px; }
.btn:nth-child(4){ left:1000px; }

.btn img{
  position:absolute;
  bottom:0;
  width:100%;
}

/* 価格（ここ修正） */
.price{
  position:absolute;
  bottom:20px; /* ←ちゃんと中に入る */
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-size:24px;
  text-shadow:2px 2px 0 #000;
}
</style>
</head>

<body>

<div id="game">

<img src="bg.jpg" class="bg">

<div class="panel">
  <div class="panel-text">
    <div id="money">所持金：0円</div>
    <div>ニット帽：<span id="hat">0</span>個</div>
    <div>商品単価：<span id="price">100</span>円</div>
    <div>パート：<span id="worker">0</span>人（LV<span id="workerLv">1</span>）</div>
    <div>工場数：<span id="factory">0</span>棟</div>
  </div>

  <div class="save" onclick="saveGame()">保存して終了</div>
</div>

<img src="knit-hat-v2.png" class="hat" id="hatBtn">

<div class="deliver" onclick="sellAll()">
  <img src="btn_deliver2.png">
</div>

<div class="bottom">

  <div class="btn" onclick="upgrade()">
    <img src="btn_upgrade2.png">
    <div class="price" id="priceCost"></div>
  </div>

  <div class="btn" onclick="hire()">
    <img src="btn_worker2.png">
    <div class="price" id="workerCost"></div>
  </div>

  <div class="btn" onclick="train()">
    <img src="btn_training2.png">
    <div class="price" id="trainCost"></div>
  </div>

  <div class="btn" onclick="build()">
    <img src="btn_factory2.png">
    <div class="price" id="factoryCost"></div>
  </div>

</div>

</div>

<script>
let money=0,hats=0,price=100,worker=0,factory=0,workerLv=1;
let autoBuffer=0;

function formatMoney(num){
  if(num>=1e8) return (num/1e8).toFixed(2)+"億円";
  if(num>=1e4) return (num/1e4).toFixed(2)+"万円";
  return Math.floor(num)+"円";
}

function getGain(){
  return (worker*0.2*workerLv)+(factory*1.5);
}

/* エフェクト */
function hatEffect(x,y,val){
  spawnPop(x,y,"+"+val);
  hatBtn.style.transform="scale(0.9)";
  setTimeout(()=>hatBtn.style.transform="scale(1)",80);
}

function spawnPop(x,y,text){
  let p=document.createElement("div");
  p.className="pop";
  p.innerText=text;
  p.style.left=x+"px";
  p.style.top=y+"px";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),800);
}

hatBtn.onclick=()=>{
  hats++;
  let rect=hatBtn.getBoundingClientRect();
  hatEffect(rect.left+150, rect.top+100, 1);
  update();
};

setInterval(()=>{
  let gain=getGain();
  hats+=gain;
  autoBuffer+=gain;

  let trigger=Math.floor(autoBuffer);
  if(trigger>=1){
    autoBuffer-=trigger;
    let rect=hatBtn.getBoundingClientRect();
    hatEffect(rect.left+150, rect.top+120, trigger);
  }
  update();
},500);

function sellAll(){
  money+=Math.floor(hats*price);
  hats=0;
  update();
}

function upgrade(){
  let cost=Math.floor(500*Math.pow(1.5,(price-100)/20));
  if(money>=cost){money-=cost;price+=20;}
}

function hire(){
  let cost=Math.floor(200*Math.pow(1.4,worker));
  if(money>=cost){money-=cost;worker++;}
}

function train(){
  let cost=Math.floor(2000*Math.pow(2,workerLv-1));
  if(money>=cost){money-=cost;workerLv++;}
}

function build(){
  let cost=Math.floor(5000*Math.pow(1.8,factory));
  if(money>=cost){money-=cost;factory++;}
}

function saveGame(){
  localStorage.setItem("save",JSON.stringify({money,hats,price,worker,factory,workerLv}));
}

(function(){
  let s=localStorage.getItem("save");
  if(s){
    let d=JSON.parse(s);
    money=d.money;
    hats=d.hats;
    price=d.price;
    worker=d.worker;
    factory=d.factory;
    workerLv=d.workerLv;
  }
})();

function update(){
  moneyEl.innerText="所持金："+formatMoney(money);
  hatEl.innerText=Math.floor(hats);
  priceEl.innerText=price;
  workerEl.innerText=worker;
  workerLvEl.innerText=workerLv;
  factoryEl.innerText=factory;

  priceCost.innerText=formatMoney(500*Math.pow(1.5,(price-100)/20));
  workerCost.innerText=formatMoney(200*Math.pow(1.4,worker));
  trainCost.innerText=formatMoney(2000*Math.pow(2,workerLv-1));
  factoryCost.innerText=formatMoney(5000*Math.pow(1.8,factory));
}

const moneyEl=document.getElementById("money");
const hatEl=document.getElementById("hat");
const priceEl=document.getElementById("price");
const workerEl=document.getElementById("worker");
const workerLvEl=document.getElementById("workerLv");
const factoryEl=document.getElementById("factory");

const priceCost=document.getElementById("priceCost");
const workerCost=document.getElementById("workerCost");
const trainCost=document.getElementById("trainCost");
const factoryCost=document.getElementById("factoryCost");

update();
</script>

</body>
</html>
