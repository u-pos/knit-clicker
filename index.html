<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ニット帽クリッカー</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'DotGothic16';
}

#game{
  width:1280px;
  height:720px;
  position:relative;
}

.bg{ position:absolute;width:100%;height:100%; }

/* パネル */
.panel{
  position:absolute;
  top:20px;
  left:20px;
  width:340px;
  padding:18px;
  background:rgba(0,0,0,0.85);
  border-radius:12px;
}

.panel-text{
  color:#ffd700;
  font-size:20px;
  line-height:2.2;
}

/* 操作ボタン */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-top:10px;
}

.ctrl{
  background:#222;
  color:#fff;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

/* ニット */
.hat{
  position:absolute;
  top:170px;
  left:540px;
  width:360px;
  cursor:pointer;
  transition:0.1s;
}

/* 納品 */
.deliver{
  position:absolute;
  top:20px;
  right:40px;
  width:260px;
  cursor:pointer;
}
.deliver img{ width:100%; }

/* 下 */
.bottom{
  position:absolute;
  bottom:0;
  width:100%;
  height:200px;
}

.btn{
  position:absolute;
  width:280px;
  height:200px;
  cursor:pointer;
}

.btn:nth-child(1){left:40px;}
.btn:nth-child(2){left:360px;}
.btn:nth-child(3){left:680px;}
.btn:nth-child(4){left:1000px;}

.btn img{
  position:absolute;
  bottom:0;
  width:100%;
}

.price{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
}

/* ポップ */
.pop{
  position:absolute;
  color:#fff;
  font-size:28px;
  animation:pop 0.8s forwards;
}
@keyframes pop{
  100%{opacity:0;transform:translateY(-60px);}
}
</style>
</head>

<body>

<div id="game">
<img src="bg.jpg" class="bg">

<!-- 左パネル -->
<div class="panel">
  <div class="panel-text">
    <div id="money"></div>
    <div>ニット帽：<span id="hat"></span>個</div>
    <div>商品単価：<span id="price"></span>円</div>
    <div>パート：<span id="worker"></span>人（LV<span id="workerLv"></span>）</div>
    <div>工場数：<span id="factory"></span>棟</div>
    <div>転生：<span id="soul"></span></div>
  </div>

  <div class="grid">
    <div class="ctrl" onclick="prestige()">転生する</div>
    <div class="ctrl" onclick="saveAndPause()">保存して終了</div>
    <div class="ctrl" onclick="resumeGame()">再開する</div>
    <div class="ctrl" onclick="resetGame()">廃業する</div>
  </div>
</div>

<!-- ニット -->
<img src="knit-hat-v2.png" class="hat" id="hatBtn">

<!-- 納品 -->
<div class="deliver" onclick="sellAll(this)">
  <img src="btn_deliver2.png">
</div>

<!-- 下ボタン -->
<div class="bottom">
  <div class="btn" onclick="hire(this)"><img src="btn_worker2.png"><div class="price" id="workerCost"></div></div>
  <div class="btn" onclick="upgrade(this)"><img src="btn_upgrade2.png"><div class="price" id="priceCost"></div></div>
  <div class="btn" onclick="train(this)"><img src="btn_training2.png"><div class="price" id="trainCost"></div></div>
  <div class="btn" onclick="build(this)"><img src="btn_factory2.png"><div class="price" id="factoryCost"></div></div>
</div>

</div>

<!-- 音 -->
<audio id="clickSound" src="click.mp3"></audio>
<audio id="upSound" src="up.mp3"></audio>
<audio id="moneySound" src="money.mp3"></audio>

<script>
let money=0,hats=0,price=100,worker=0,factory=0,workerLv=1,soul=0;
let upgradeCount=0;
let autoBuffer=0;
let paused=false;

/* 表示 */
function format(n){
  if(n>=1e8)return(n/1e8).toFixed(2)+"億円";
  if(n>=1e4)return(n/1e4).toFixed(2)+"万円";
  return Math.floor(n)+"円";
}

/* 生産 */
function getGain(){
  return (worker*0.05*workerLv)+(factory*1.0);
}

/* エフェクト */
function hatEffect(x,y,val){
  spawnPop(x,y,"+"+val);
  hatBtn.style.transform="scale(0.9)";
  setTimeout(()=>hatBtn.style.transform="scale(1)",80);
}

function spawnPop(x,y,text){
  let p=document.createElement("div");
  p.className="pop";
  p.innerText=text;
  p.style.left=x+"px";
  p.style.top=y+"px";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),800);
}

function pressEffect(el){
  el.style.transform="scale(0.9)";
  setTimeout(()=>el.style.transform="scale(1)",80);
}

/* 音 */
const clickSound=document.getElementById("clickSound");
const upSound=document.getElementById("upSound");
const moneySound=document.getElementById("moneySound");

/* 手動クリック */
hatBtn.onclick=()=>{
  if(paused)return;
  hats++;
  clickSound.currentTime=0;
  clickSound.play();

  let r=hatBtn.getBoundingClientRect();
  hatEffect(r.left+150,r.top+100,1);
  update();
};

/* 自動 */
setInterval(()=>{
  if(paused)return;

  let g=getGain();
  hats+=g;
  autoBuffer+=g;

  let t=Math.floor(autoBuffer);
  if(t>=1){
    autoBuffer-=t;
    let r=hatBtn.getBoundingClientRect();
    hatEffect(r.left+150,r.top+120,t);
  }
  update();
},500);

/* 納品 */
function sellAll(el){
  if(paused)return;

  if(hats>0){
    money+=Math.floor(hats*price);
    hats=0;

    moneySound.currentTime=0;
    moneySound.play();

    pressEffect(el);
  }
  update();
}

/* 強化 */
function upgrade(el){
  let cost=Math.floor(500*Math.pow(1.25,upgradeCount));
  if(money>=cost){
    money-=cost;
    price+=10;
    upgradeCount++;

    upSound.currentTime=0;
    upSound.play();
    pressEffect(el);
  }
}

function hire(el){
  let c=100*Math.pow(1.5,worker);
  if(money>=c){
    money-=c;
    worker++;
    upSound.play();
    pressEffect(el);
  }
}

function train(el){
  let c=2000*Math.pow(2.2,workerLv-1);
  if(money>=c){
    money-=c;
    workerLv++;
    upSound.play();
    pressEffect(el);
  }
}

function build(el){
  let c=5000*Math.pow(2,factory);
  if(money>=c){
    money-=c;
    factory++;
    upSound.play();
    pressEffect(el);
  }
}

/* 制御 */
function saveAndPause(){
  saveGame();
  paused=true;
}

function resumeGame(){
  paused=false;
}

function resetGame(){
  localStorage.removeItem("save");
  location.reload();
}

/* 転生 */
function prestige(){
  if(money<1e8){alert("1億円必要");return;}
  let g=Math.floor(Math.sqrt(money/1e8));
  soul+=g;
  money=0;hats=0;price=100;worker=0;factory=0;workerLv=1;upgradeCount=0;
}

/* 保存 */
function saveGame(){
  localStorage.setItem("save",JSON.stringify({
    money,hats,price,worker,factory,workerLv,soul,upgradeCount
  }));
}

/* 読込 */
(function(){
  let s=localStorage.getItem("save");
  if(s){
    let d=JSON.parse(s);
    money=d.money||0;
    hats=d.hats||0;
    price=d.price||100;
    worker=d.worker||0;
    factory=d.factory||0;
    workerLv=d.workerLv||1;
    soul=d.soul||0;
    upgradeCount=d.upgradeCount||0;
  }
})();

/* 更新 */
function update(){
  moneyEl.innerText="所持金："+format(money);
  hatEl.innerText=Math.floor(hats);
  priceEl.innerText=price;
  workerEl.innerText=worker;
  workerLvEl.innerText=workerLv;
  factoryEl.innerText=factory;
  soulEl.innerText=soul;

  priceCost.innerText=format(500*Math.pow(1.25,upgradeCount));
  workerCost.innerText=format(100*Math.pow(1.5,worker));
  trainCost.innerText=format(2000*Math.pow(2.2,workerLv-1));
  factoryCost.innerText=format(5000*Math.pow(2,factory));
}

const moneyEl=document.getElementById("money");
const hatEl=document.getElementById("hat");
const priceEl=document.getElementById("price");
const workerEl=document.getElementById("worker");
const workerLvEl=document.getElementById("workerLv");
const factoryEl=document.getElementById("factory");
const soulEl=document.getElementById("soul");

const priceCost=document.getElementById("priceCost");
const workerCost=document.getElementById("workerCost");
const trainCost=document.getElementById("trainCost");
const factoryCost=document.getElementById("factoryCost");

update();
</script>

</body>
</html>
