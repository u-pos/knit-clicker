<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ニット帽クリッカー</title>

<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:'DotGothic16', sans-serif;
}

/* 背景 */
#game{
  position:relative;
  width:1280px;
  height:720px;
  margin:auto;
}
.bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== 左パネル ===== */
.panel{
  position:absolute;
  top:20px;
  left:20px;
  width:300px;
}
.panel img{
  width:100%;
}
.panel-text{
  position:absolute;
  top:40px;
  left:30px;
  color:#ffd700;
  font-size:22px;
  text-shadow:2px 2px 0 #000;
  line-height:2.2;
}

/* ===== ニット帽 ===== */
.hat{
  position:absolute;
  top:280px;
  left:500px;
  width:360px;
  cursor:pointer;
  z-index:5;
}
.hat:active{
  transform:scale(0.9);
}

/* ===== 納品 ===== */
.deliver{
  position:absolute;
  top:20px;
  right:20px;
  width:300px;
  cursor:pointer;
}
.deliver-text{
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-size:26px;
  text-shadow:2px 2px 0 #000;
}

/* ===== 下ボタン ===== */
.bottom{
  position:absolute;
  bottom:0;
  left:0;
  width:1280px;
  height:220px;
}

/* 各ボタン */
.btn{
  position:absolute;
  width:300px;
  cursor:pointer;
}

.btn:nth-child(1){ left:40px; }
.btn:nth-child(2){ left:350px; }
.btn:nth-child(3){ left:660px; }
.btn:nth-child(4){ left:970px; }

.btn img{
  width:100%;
}

/* ラベル */
.label{
  position:absolute;
  top:55px;
  left:50%;
  transform:translateX(-50%);
  color:#ffd700;
  font-size:26px;
  text-shadow:2px 2px 0 #000, 0 0 8px #ffcc00;
}

/* 価格 */
.price{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-size:22px;
  text-shadow:2px 2px 0 #000;
}
</style>
</head>

<body>

<div id="game">
  <img src="bg.jpg" class="bg">

  <!-- 左UI -->
  <div class="panel">
    <img src="panel_left.png">
    <div class="panel-text">
      <div id="money">所持金：0円</div>
      <div>ニット帽：<span id="hat">0</span></div>
      <div>商品単価：<span id="price">10</span>円</div>
      <div>パート：<span id="worker">0</span></div>
      <div>工場数：<span id="factory">0</span></div>
    </div>
  </div>

  <!-- ニット -->
  <img src="knit-hat-v2.png" class="hat" id="hatBtn">

  <!-- 納品 -->
  <div class="deliver" onclick="sellAll()">
    <img src="btn_deliver.png">
    <div class="deliver-text">すべて納品</div>
  </div>

  <!-- 下ボタン -->
  <div class="bottom">

    <div class="btn" onclick="upgrade()">
      <img src="btn_upgrade.png">
      <div class="label">商品単価UP</div>
      <div class="price" id="priceCost"></div>
    </div>

    <div class="btn" onclick="hire()">
      <img src="btn_worker.png">
      <div class="label">パート</div>
      <div class="price" id="workerCost"></div>
    </div>

    <div class="btn" onclick="train()">
      <img src="btn_training.png">
      <div class="label">強化</div>
      <div class="price" id="trainCost"></div>
    </div>

    <div class="btn" onclick="build()">
      <img src="btn_factory.png">
      <div class="label">工場</div>
      <div class="price" id="factoryCost"></div>
    </div>

  </div>
</div>

<script>
let money=0;
let hats=0;
let price=10;
let worker=0;
let factory=0;

/* クリック */
hatBtn.onclick=()=>{
  hats++;
  update();
};

/* 自動 */
setInterval(()=>{
  hats += worker * 0.05;
  hats += factory * 0.1;
  update();
},100);

/* 納品 */
function sellAll(){
  money += Math.floor(hats * price);
  hats=0;
  update();
}

/* 強化 */
function upgrade(){
  let cost = price * 50;
  if(money >= cost){
    money -= cost;
    price++;
  }
}

function hire(){
  let cost = 100 * (worker + 1);
  if(money >= cost){
    money -= cost;
    worker++;
  }
}

function train(){
  let cost = 500 * (worker + 1);
  if(money >= cost){
    money -= cost;
  }
}

function build(){
  let cost = 2000 * (factory + 1);
  if(money >= cost){
    money -= cost;
    factory++;
  }
}

/* 更新 */
function update(){
  money.innerText = "所持金：" + Math.floor(window.money) + "円";
  hat.innerText = Math.floor(hats);
  price.innerText = price;
  worker.innerText = worker;
  factory.innerText = factory;

  priceCost.innerText = (price*50) + "円";
  workerCost.innerText = (100*(worker+1)) + "円";
  trainCost.innerText = (500*(worker+1)) + "円";
  factoryCost.innerText = (2000*(factory+1)) + "円";
}

update();
</script>

</body>
</html>
