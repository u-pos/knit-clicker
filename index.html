<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ニット帽クリッカー</title>

<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'DotGothic16', sans-serif;
}

/* ===== 画面固定 ===== */
#game{
  width:1280px;
  height:720px;
  position:relative;
  overflow:hidden;
}

/* 背景 */
.bg{
  width:1280px;
  height:720px;
  position:absolute;
}

/* ===== 左パネル（サイズ強制） ===== */
.panel{
  position:absolute;
  top:20px;
  left:20px;
  width:260px; /* ←強制 */
}

.panel img{
  width:260px; /* ←画像サイズ無視して固定 */
}

.panel-text{
  position:absolute;
  top:45px;
  left:25px;
  color:#ffd700;
  font-size:20px;
  line-height:2.2;
  text-shadow:2px 2px 0 #000;
}

/* ===== ニット ===== */
.hat{
  position:absolute;
  top:260px;
  left:540px;
  width:340px;
  cursor:pointer;
}
.hat:active{
  transform:scale(0.9);
}

/* ===== 納品ボタン（ここが今回の本命） ===== */
.deliver{
  position:absolute;
  top:20px;
  right:40px;
  width:260px;  /* ←強制縮小 */
}

.deliver img{
  width:260px; /* ←画像サイズ無視 */
}

.deliver-text{
  position:absolute;
  top:42px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-size:24px;
  text-shadow:2px 2px 0 #000;
}

/* ===== 下ボタン ===== */
.bottom{
  position:absolute;
  bottom:0;
  width:1280px;
  height:200px;
}

.btn{
  position:absolute;
  width:280px;
}

.btn:nth-child(1){ left:40px; }
.btn:nth-child(2){ left:360px; }
.btn:nth-child(3){ left:680px; }
.btn:nth-child(4){ left:1000px; }

.btn img{
  width:280px;
}

/* ラベル */
.label{
  position:absolute;
  top:55px;
  left:50%;
  transform:translateX(-50%);
  color:#ffd700;
  font-size:24px;
  text-shadow:2px 2px 0 #000;
}

/* 価格 */
.price{
  position:absolute;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-size:20px;
  text-shadow:2px 2px 0 #000;
}
</style>
</head>

<body>

<div id="game">

  <img src="bg.jpg" class="bg">

  <!-- 左 -->
  <div class="panel">
    <img src="panel_left.png">
    <div class="panel-text">
      <div id="money">所持金：0円</div>
      <div>ニット帽：<span id="hat">0</span></div>
      <div>商品単価：<span id="price">10</span>円</div>
      <div>パート：<span id="worker">0</span></div>
      <div>工場数：<span id="factory">0</span></div>
    </div>
  </div>

  <!-- ニット -->
  <img src="knit-hat-v2.png" class="hat" id="hatBtn">

  <!-- 納品 -->
  <div class="deliver" onclick="sellAll()">
    <img src="btn_deliver.png">
    <div class="deliver-text">すべて納品</div>
  </div>

  <!-- 下 -->
  <div class="bottom">

    <div class="btn" onclick="upgrade()">
      <img src="btn_upgrade.png">
      <div class="label">商品単価UP</div>
      <div class="price" id="priceCost"></div>
    </div>

    <div class="btn" onclick="hire()">
      <img src="btn_worker.png">
      <div class="label">パート</div>
      <div class="price" id="workerCost"></div>
    </div>

    <div class="btn" onclick="train()">
      <img src="btn_training.png">
      <div class="label">強化</div>
      <div class="price" id="trainCost"></div>
    </div>

    <div class="btn" onclick="build()">
      <img src="btn_factory.png">
      <div class="label">工場</div>
      <div class="price" id="factoryCost"></div>
    </div>

  </div>

</div>

<script>
let money=0;
let hats=0;
let price=10;
let worker=0;
let factory=0;

hatBtn.onclick=()=>{
  hats++;
  update();
};

setInterval(()=>{
  hats += worker * 0.05;
  hats += factory * 0.1;
  update();
},100);

function sellAll(){
  money += Math.floor(hats * price);
  hats=0;
  update();
}

function upgrade(){
  let cost = price * 50;
  if(money>=cost){
    money-=cost;
    price++;
  }
}

function hire(){
  let cost = 100 * (worker+1);
  if(money>=cost){
    money-=cost;
    worker++;
  }
}

function train(){
  let cost = 500 * (worker+1);
  if(money>=cost){
    money-=cost;
  }
}

function build(){
  let cost = 2000 * (factory+1);
  if(money>=cost){
    money-=cost;
    factory++;
  }
}

/* ===== 小数点完全排除 ===== */
function update(){
  moneyEl.innerText="所持金："+Math.floor(money)+"円";
  hatEl.innerText=Math.floor(hats);
  priceEl.innerText=Math.floor(price);
  workerEl.innerText=Math.floor(worker);
  factoryEl.innerText=Math.floor(factory);

  priceCost.innerText=Math.floor(price*50)+"円";
  workerCost.innerText=Math.floor(100*(worker+1))+"円";
  trainCost.innerText=Math.floor(500*(worker+1))+"円";
  factoryCost.innerText=Math.floor(2000*(factory+1))+"円";
}

const moneyEl=document.getElementById("money");
const hatEl=document.getElementById("hat");
const priceEl=document.getElementById("price");
const workerEl=document.getElementById("worker");
const factoryEl=document.getElementById("factory");

const priceCost=document.getElementById("priceCost");
const workerCost=document.getElementById("workerCost");
const trainCost=document.getElementById("trainCost");
const factoryCost=document.getElementById("factoryCost");

update();
</script>

</body>
</html>
