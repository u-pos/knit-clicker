<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ニット帽クリッカー</title>

<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:'DotGothic16', sans-serif;
}

/* 背景 */
#game{
  position:relative;
  width:100vw;
  height:100vh;
}
.bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 左パネル */
.panel{
  position:absolute;
  top:20px;
  left:20px;
  width:320px;
}
.panel img{
  width:100%;
}
.panel-text{
  position:absolute;
  top:20px;
  left:20px;
  color:#ffd700;
  text-shadow:2px 2px 0 #000;
  font-size:20px;
}

/* ニット帽 */
.hat{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-10%,-20%);
  width:420px;
  cursor:pointer;
}
.hat:active{
  transform:translate(-10%,-20%) scale(0.9);
}

/* ボタン共通 */
.btn{
  position:relative;
  width:25%;
}
.btn img{
  width:100%;
}
.btn-label{
  position:absolute;
  top:25%;
  left:50%;
  transform:translateX(-50%);
  color:#ffd700;
  font-size:26px;
  text-shadow:2px 2px 0 #000;
}
.btn-price{
  position:absolute;
  bottom:15%;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-size:20px;
  text-shadow:2px 2px 0 #000;
}

/* 下ボタン */
.bottom{
  position:absolute;
  bottom:0;
  width:100%;
  display:flex;
}

/* 納品 */
.deliver{
  position:absolute;
  top:20px;
  right:20px;
  width:260px;
}
.deliver-text{
  position:absolute;
  top:35%;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-size:24px;
  text-shadow:2px 2px 0 #000;
}
</style>
</head>

<body>

<div id="game">
  <img src="bg.jpg" class="bg">

  <!-- 左UI -->
  <div class="panel">
    <img src="panel_left.png">
    <div class="panel-text">
      <div id="money">0円</div>
      <div>ニット帽：<span id="hat">0</span></div>
      <div>単価：<span id="price">10</span></div>
      <div>パート：<span id="worker">0</span></div>
      <div>工場：<span id="factory">0</span></div>
    </div>
  </div>

  <!-- ニット -->
  <img src="knit-hat-v2.png" class="hat" id="hatBtn">

  <!-- 納品 -->
  <div class="deliver" onclick="sellAll()">
    <img src="btn_deliver.png">
    <div class="deliver-text">すべて納品</div>
  </div>

  <!-- 下 -->
  <div class="bottom">

    <div class="btn" onclick="upgrade()">
      <img src="btn_upgrade.png">
      <div class="btn-label">商品単価UP</div>
      <div class="btn-price" id="priceCost">500円</div>
    </div>

    <div class="btn" onclick="hire()">
      <img src="btn_worker.png">
      <div class="btn-label">パート</div>
      <div class="btn-price" id="workerCost">3000円</div>
    </div>

    <div class="btn" onclick="train()">
      <img src="btn_training.png">
      <div class="btn-label">強化</div>
      <div class="btn-price" id="trainCost">10000円</div>
    </div>

    <div class="btn" onclick="build()">
      <img src="btn_factory.png">
      <div class="btn-label">工場</div>
      <div class="btn-price" id="factoryCost">50000円</div>
    </div>

  </div>
</div>

<script>
let money=0,hats=0,price=10,worker=0,factory=0;

document.getElementById("hatBtn").onclick=()=>{
  hats++;
  update();
};

function sellAll(){
  money += hats*price;
  hats=0;
  update();
}

function upgrade(){
  let cost = price*50;
  if(money>=cost){
    money-=cost;
    price++;
  }
}

function hire(){
  let cost = 100*(worker+1);
  if(money>=cost){
    money-=cost;
    worker++;
  }
}

function train(){
  let cost = 500*(worker+1);
  if(money>=cost){
    money-=cost;
  }
}

function build(){
  let cost = 2000*(factory+1);
  if(money>=cost){
    money-=cost;
    factory++;
  }
}

function update(){
  moneyEl.innerText = money+"円";
  hatEl.innerText = hats;
  priceEl.innerText = price;
}

const moneyEl=document.getElementById("money");
const hatEl=document.getElementById("hat");
const priceEl=document.getElementById("price");
</script>

</body>
</html>
