<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ニット帽クリッカー</title>

<style>
@font-face {
  font-family: gamefont;
  src: url(font.ttf);
}

body{
  margin:0;
  overflow:hidden;
  font-family:gamefont;
}

/* 背景 */
#game{
  position:relative;
  width:100vw;
  height:100vh;
}

.bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* =====================
 左UIパネル（画像）
===================== */
.panel{
  position:absolute;
  top:20px;
  left:20px;
  width:320px;
  z-index:10;
}

.panel img{
  width:100%;
}

.panel-text{
  position:absolute;
  top:20px;
  left:20px;
  color:#ffd700;
  text-shadow:2px 2px 4px #000;
}

.row{
  margin-top:15px;
}

/* =====================
 ニット帽（確定位置）
===================== */
.hat{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-10%, -20%);
  width:420px;
  z-index:5;
}

.hat:active{
  transform:translate(-10%, -20%) scale(0.9);
}

/* =====================
 右上納品ボタン
===================== */
.deliver{
  position:absolute;
  top:20px;
  right:20px;
  width:260px;
  cursor:pointer;
}

/* =====================
 下ボタン（画像UI）
===================== */
.bottom{
  position:absolute;
  bottom:0;
  width:100%;
  display:flex;
}

.bottom img{
  width:25%;
  cursor:pointer;
}

/* 保存 */
.save{
  position:absolute;
  right:20px;
  bottom:90px;
  width:220px;
}
</style>
</head>

<body>

<div id="game">
  <img src="bg.jpg" class="bg">

  <!-- 左パネル -->
  <div class="panel">
    <img src="panel_left.png">
    <div class="panel-text">
      <div id="money">4,579円</div>

      <div class="row">ニット帽：<span id="hat">50</span></div>
      <div class="row">商品単価：<span id="price">63</span>円</div>
      <div class="row">パート：<span id="worker">7</span>人</div>
      <div class="row">工場数：<span id="factory">1</span></div>
    </div>
  </div>

  <!-- ニット -->
  <img src="knit-hat-v2.png" class="hat" id="hatBtn">

  <!-- 納品 -->
  <img src="btn_deliver.png" class="deliver" onclick="sellAll()">

  <!-- 下 -->
  <div class="bottom">
    <img src="btn_upgrade.png" onclick="upgrade()">
    <img src="btn_worker.png" onclick="hire()">
    <img src="btn_training.png" onclick="train()">
    <img src="btn_factory.png" onclick="build()">
  </div>

  <img src="btn_save.png" class="save" onclick="save()">
</div>

<script>
let money=4579,hats=50,price=63,worker=7,factory=1;

document.getElementById("hatBtn").onclick=()=>{
  hats++;
  update();
};

function sellAll(){
  money += hats * price;
  hats=0;
  update();
}

function upgrade(){
  if(money>500){
    money-=500;
    price+=1;
  }
}

function hire(){
  if(money>3000){
    money-=3000;
    worker++;
  }
}

function train(){
  if(money>10000){
    money-=10000;
  }
}

function build(){
  if(money>50000){
    money-=50000;
    factory++;
  }
}

function update(){
  moneyEl.innerText=money+"円";
  hatEl.innerText=hats;
  priceEl.innerText=price;
  workerEl.innerText=worker;
  factoryEl.innerText=factory;
}

function save(){
  localStorage.setItem("save",JSON.stringify({money,hats,price,worker,factory}));
}

const moneyEl=document.getElementById("money");
const hatEl=document.getElementById("hat");
const priceEl=document.getElementById("price");
const workerEl=document.getElementById("worker");
const factoryEl=document.getElementById("factory");
</script>

</body>
</html>
