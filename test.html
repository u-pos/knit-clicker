<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ニット帽クリッカー</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'DotGothic16';}
#game{width:1280px;height:720px;position:relative;}
.bg{position:absolute;width:100%;height:100%;}

.panel{position:absolute;top:20px;left:20px;width:340px;padding:18px;background:rgba(0,0,0,0.85);border-radius:12px;}
.panel-text{color:#ffd700;font-size:26px;line-height:2.0;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}
.ctrl{background:#222;color:#fff;padding:10px;text-align:center;cursor:pointer;transition:0.1s;}
.ctrl:active{background:#a00000;transform:scale(0.95);}

.hat{position:absolute;top:150px;left:540px;width:360px;cursor:pointer;transition:0.1s;}

.deliver{position:absolute;top:20px;right:40px;width:260px;cursor:pointer;}
.deliver img{width:100%;}

.bottom{position:absolute;bottom:0;width:100%;height:200px;}
.btn{position:absolute;width:280px;height:200px;cursor:pointer;}
.btn:nth-child(1){left:40px;}
.btn:nth-child(2){left:360px;}
.btn:nth-child(3){left:680px;}
.btn:nth-child(4){left:1000px;}
.btn img{position:absolute;bottom:0;width:100%;}

.price{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);color:#fff;font-size:28px;}

.pop{position:absolute;color:#fff;font-size:28px;animation:pop 0.8s forwards;}
@keyframes pop{100%{opacity:0;transform:translateY(-60px);}}

</style>
</head>

<body>

<div id="game">
<img src="bg.jpg" class="bg">

<div class="panel">
  <div class="panel-text">
    <div id="money"></div>
    <div id="stats"></div>
  </div>
</div>

<img src="hat.png" class="hat" id="hat">

<div class="bottom">
  <div class="btn" onclick="buy(0)">
    <img src="btn1.png">
    <div class="price" id="price0"></div>
  </div>
  <div class="btn" onclick="buy(1)">
    <img src="btn2.png">
    <div class="price" id="price1"></div>
  </div>
  <div class="btn" onclick="buy(2)">
    <img src="btn3.png">
    <div class="price" id="price2"></div>
  </div>
  <div class="btn" onclick="buy(3)">
    <img src="btn4.png">
    <div class="price" id="price3"></div>
  </div>
</div>

</div>

<script>
let money = 0;

// パート・LV・工場（最大99）
let parts = [0,0,0,0];
let levels = [1,1,1,1];
let factories = [0,0,0,0];

const MAX = 99;

// =====================
// 金額フォーマット
// =====================
function formatMoney(num){
    num = Math.floor(num); // 小数点切り捨て

    if(num >= 1e16) return (num/1e16).toFixed(2).replace(/\.00$/,'') + "京";
    if(num >= 1e12) return (num/1e12).toFixed(2).replace(/\.00$/,'') + "兆";
    if(num >= 1e8)  return (num/1e8).toFixed(2).replace(/\.00$/,'') + "億";
    if(num >= 1e4)  return (num/1e4).toFixed(2).replace(/\.00$/,'') + "万";
    return num + "円";
}

// =====================
// コストフォーマット（万円以上のみ単位変換）
// =====================
function formatCost(num){
    num = Math.floor(num);

    if(num >= 1e8)  return (num/1e8).toFixed(2).replace(/\.00$/,'') + "億円";
    if(num >= 1e4)  return (num/1e4).toFixed(2).replace(/\.00$/,'') + "万円";
    return num + "円";
}

// =====================
// コスト計算
// =====================
function getCost(i){
    return Math.floor(100 * Math.pow(1.3, parts[i] + levels[i] + factories[i]));
}

// =====================
// 購入処理
// =====================
function buy(i){
    let cost = getCost(i);

    if(money < cost) return;

    money -= cost;

    // パート増加（最大99）
    if(parts[i] < MAX){
        parts[i]++;
    }
}

// =====================
// クリック
// =====================
document.getElementById("hat").onclick = function(){
    money += 1;
}

// =====================
// 自動生産
// =====================
setInterval(()=>{
    let total = 0;

    for(let i=0;i<4;i++){
        total += parts[i] * levels[i] * (factories[i] + 1);
    }

    money += total;
},1000);

// =====================
// 更新
// =====================
function update(){
    document.getElementById("money").innerText = "所持金: " + formatMoney(money);

    document.getElementById("stats").innerText =
        "パート: " + parts.join(",") + "\n" +
        "LV: " + levels.join(",") + "\n" +
        "工場: " + factories.join(",");

    for(let i=0;i<4;i++){
        document.getElementById("price"+i).innerText = formatCost(getCost(i));
    }
}

setInterval(update,100);
</script>

</body>
</html>
