<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ニット帽クリッカー</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'DotGothic16';}
#game{width:1280px;height:720px;position:relative;}
.bg{position:absolute;width:100%;height:100%;}

.panel{position:absolute;top:20px;left:20px;width:340px;padding:18px;background:rgba(0,0,0,0.85);border-radius:12px;}
.panel-text{color:#ffd700;font-size:26px;line-height:2.0;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}
.ctrl{background:#222;color:#fff;padding:10px;text-align:center;cursor:pointer;transition:0.1s;}
.ctrl:active{background:#a00000;transform:scale(0.95);}

.hat{position:absolute;top:150px;left:540px;width:360px;cursor:pointer;transition:0.1s;}

.deliver{position:absolute;top:20px;right:40px;width:260px;cursor:pointer;}
.deliver img{width:100%;}

.bottom{position:absolute;bottom:0;width:100%;height:200px;}
.btn{position:absolute;width:280px;height:200px;cursor:pointer;}
.btn:nth-child(1){left:40px;}
.btn:nth-child(2){left:360px;}
.btn:nth-child(3){left:680px;}
.btn:nth-child(4){left:1000px;}
.btn img{position:absolute;bottom:0;width:100%;}

.price{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);color:#fff;font-size:28px;}

.pop{position:absolute;color:#fff;font-size:28px;animation:pop 0.8s forwards;}
@keyframes pop{100%{opacity:0;transform:translateY(-60px);}}

.modal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
background:#000;padding:20px;border:2px solid #fff;text-align:center;display:none;z-index:999;}
.modal.active{display:block;}
#modalText{color:#fff;font-size:24px;}
.modal button{margin:10px;padding:10px;}
</style>
</head>

<body>

<div id="game">
<img src="bg.jpg" class="bg">

<div class="panel">
  <div class="panel-text">
    <div id="money"></div>
    <div>ニット帽：<span id="hat"></span>個</div>
    <div>商品単価：<span id="price"></span>円</div>
    <div>パート：<span id="worker"></span>人（LV<span id="workerLv"></span>）</div>
    <div>工場数：<span id="factory"></span>棟</div>
    <div>転生：<span id="soul"></span>回</div>
  </div>

  <div class="grid">
    <div class="ctrl" onclick="confirmPrestige()">転生する</div>
    <div class="ctrl" onclick="saveAndPause()">保存して終了</div>
    <div class="ctrl" onclick="resumeGame()">再開する</div>
    <div class="ctrl" onclick="confirmReset()">廃業する</div>
  </div>
</div>

<img src="knit-hat-v2.png" class="hat" id="hatBtn">

<div class="deliver" onclick="sellAll(this)">
  <img src="btn_deliver2.png">
</div>

<div class="bottom">
  <div class="btn" onclick="hire(this)"><img src="btn_worker2.png"><div class="price" id="workerCost"></div></div>
  <div class="btn" onclick="upgrade(this)"><img src="btn_upgrade2.png"><div class="price" id="priceCost"></div></div>
  <div class="btn" onclick="train(this)"><img src="btn_training2.png"><div class="price" id="trainCost"></div></div>
  <div class="btn" onclick="build(this)"><img src="btn_factory2.png"><div class="price" id="factoryCost"></div></div>
</div>

<div class="modal" id="modal">
  <div id="modalText"></div>
  <div id="modalButtons"></div>
</div>

</div>

<script>

const MAX=99;

/* ===== 金額フォーマット ===== */
function formatMoney(n){
 n=Math.floor(n);
 if(n>=1e16) return (Math.floor(n/1e14)/100)+"京円";
 if(n>=1e12) return (Math.floor(n/1e10)/100)+"兆円";
 if(n>=1e8)  return (Math.floor(n/1e6)/100)+"億円";
 if(n>=1e4)  return (Math.floor(n/100)/100)+"万円";
 return n+"円";
}

function formatCost(n){
 n=Math.floor(n);
 if(n>=1e8)  return (Math.floor(n/1e6)/100)+"億円";
 if(n>=1e4)  return (Math.floor(n/100)/100)+"万円";
 return n+"円";
}

function ceil10(n){return Math.ceil(n/10)*10;}

/* ===== 音 ===== */
const clickSound=new Audio("click.mp3");
const upSound=new Audio("up.mp3");
const moneySound=new Audio("money.mp3");
const bgm=new Audio("bgm.mp3");
bgm.loop=true;bgm.volume=0.3;

function playClick(){clickSound.cloneNode().play();}
function playUp(){upSound.cloneNode().play();}
function playMoney(){moneySound.cloneNode().play();}

let bgmStarted=false;
document.addEventListener("click",()=>{
 if(!bgmStarted){bgm.play().catch(()=>{});bgmStarted=true;}
},{once:true});

/* ===== 状態 ===== */
let money=0,hats=0,price=100,worker=0,factory=0,workerLv=1,soul=0;
let upgradeCount=0,autoBuffer=0,paused=false;

/* DOM */
const hatBtn=document.getElementById("hatBtn");
const modal=document.getElementById("modal");
const modalText=document.getElementById("modalText");
const modalButtons=document.getElementById("modalButtons");

const moneyEl=document.getElementById("money");
const hatEl=document.getElementById("hat");
const priceEl=document.getElementById("price");
const workerEl=document.getElementById("worker");
const workerLvEl=document.getElementById("workerLv");
const factoryEl=document.getElementById("factory");
const soulEl=document.getElementById("soul");

const priceCost=document.getElementById("priceCost");
const workerCost=document.getElementById("workerCost");
const trainCost=document.getElementById("trainCost");
const factoryCost=document.getElementById("factoryCost");

/* ===== クリック ===== */
hatBtn.onclick=()=>{
 if(paused)return;
 hats++;
 playClick();
 update();
};

/* 自動 */
setInterval(()=>{
 if(paused)return;
 let g=(worker*0.05*workerLv)+(factory*1.0);
 hats+=g;
 update();
},500);

/* 納品 */
function sellAll(el){
 if(paused)return;
 if(hats>0){
  money+=Math.floor(hats*price);
  hats=0;
  playMoney();
 }
 update();
}

/* ===== 強化（99制限） ===== */
function upgrade(el){
 let cost=ceil10(500*Math.pow(1.25,upgradeCount));
 if(money>=cost && price<MAX){
  money-=cost;price+=10;upgradeCount++;
  playUp();
 }
}
function hire(el){
 let c=ceil10(100*Math.pow(1.5,worker));
 if(money>=c && worker<MAX){
  money-=c;worker++;
  playUp();
 }
}
function train(el){
 let c=ceil10(2000*Math.pow(2.2,workerLv-1));
 if(money>=c && workerLv<MAX){
  money-=c;workerLv++;
  playUp();
 }
}
function build(el){
 let c=ceil10(5000*Math.pow(2,factory));
 if(money>=c && factory<MAX){
  money-=c;factory++;
  playUp();
 }
}

/* ===== 更新 ===== */
function update(){
 moneyEl.innerText="所持金："+formatMoney(money);
 hatEl.innerText=Math.floor(hats);
 priceEl.innerText=price;
 workerEl.innerText=worker;
 workerLvEl.innerText=workerLv;
 factoryEl.innerText=factory;
 soulEl.innerText=soul;

 priceCost.innerText=formatCost(ceil10(500*Math.pow(1.25,upgradeCount)));
 workerCost.innerText=formatCost(ceil10(100*Math.pow(1.5,worker)));
 trainCost.innerText=formatCost(ceil10(2000*Math.pow(2.2,workerLv-1)));
 factoryCost.innerText=formatCost(ceil10(5000*Math.pow(2,factory)));
}

update();

</script>

</body>
</html>
