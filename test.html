<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ニット帽クリッカー</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
}

#game{
  position:relative;
  width:100vw;
  height:100vh;
}

/* 背景 */
.bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* =========================
   左上UI（完全固定）
========================= */
.ui{
  position:absolute;
  top:20px;
  left:20px;
  color:#fff;
  font-weight:bold;
  z-index:10;
}

.money{
  font-size:26px;
  margin-bottom:15px;
}

.row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

/* 小アイコン */
.icon{
  width:26px;
}

/* =========================
   ニット帽（ラフ準拠位置）
========================= */
.hat{
  position:absolute;

  /* ←ここが今回の一番重要 */
  top:160px;
  left:180px;

  width:380px; /* ラフ通り大きめ */

  cursor:pointer;
  transition:transform 0.1s;
}

.hat:active{
  transform:scale(0.9);
}

/* =========================
   右上ボタン
========================= */
.deliver{
  position:absolute;
  top:20px;
  right:20px;

  padding:14px 26px;
  background:#2ecc71;
  border:none;
  color:#fff;
  font-size:18px;
  border-radius:10px;
  cursor:pointer;
  z-index:10;
}

/* =========================
   下ボタン（完全均等）
========================= */
.bottom{
  position:absolute;
  bottom:0;
  width:100%;
  display:flex;
}

.btn{
  flex:1;
  padding:22px;
  font-size:18px;
  border:none;
  color:#fff;
  cursor:pointer;
}

.up{background:#8e44ad;}
.worker{background:#2980b9;}
.training{background:#e67e22;}
.factory{background:#c0392b;}

/* 保存 */
.save{
  position:absolute;
  right:20px;
  bottom:100px;
  padding:12px 20px;
  background:#555;
  color:#fff;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="game">
  <img src="bg.jpg" class="bg">

  <!-- 左UI -->
  <div class="ui">
    <div class="money" id="money">所持金: 0円</div>

    <div class="row">
      <img src="knit-hat-v2.png" class="icon">
      ニット帽: <span id="hatCount">0</span>
    </div>

    <div class="row">
      💰 商品単価: <span id="price">10</span>円
    </div>

    <div class="row">
      <img src="worker.png" class="icon">
      パート: <span id="worker">0</span>人 / LV.<span id="workerLv">1</span>
    </div>

    <div class="row">
      🏭 工場数: <span id="factory">0</span>
    </div>
  </div>

  <!-- 右上 -->
  <button class="deliver" onclick="sellAll()">すべて納品</button>

  <!-- ニット -->
  <img src="knit-hat-v2.png" class="hat" id="hat">

  <!-- 下 -->
  <div class="bottom">
    <button class="btn up" onclick="upgradePrice()">商品単価UP</button>
    <button class="btn worker" onclick="hire()">パートを雇う</button>
    <button class="btn training" onclick="train()">強化合宿</button>
    <button class="btn factory" onclick="build()">工場増設</button>
  </div>

  <button class="save" onclick="save()">保存して終了</button>
</div>

<script>
let money=0,hats=0,price=10,workers=0,workerLv=1,factories=0;

document.getElementById("hat").onclick=()=>{
  hats++;
  update();
};

/* 自動 */
setInterval(()=>{
  hats += workers * workerLv * 0.05;
  hats += factories * 0.1;
  update();
},100);

/* 納品 */
function sellAll(){
  money += Math.floor(hats * price);
  hats=0;
  update();
}

/* 強化（かなり渋めに調整） */
function upgradePrice(){
  let cost=price*80;
  if(money>=cost){
    money-=cost;
    price+=1;
  }
}

function hire(){
  let cost=200*(workers+1);
  if(money>=cost){
    money-=cost;
    workers++;
  }
}

function train(){
  let cost=1000*workerLv;
  if(money>=cost){
    money-=cost;
    workerLv++;
  }
}

function build(){
  let cost=5000*(factories+1);
  if(money>=cost){
    money-=cost;
    factories++;
  }
}

/* 表示 */
function update(){
  moneyEl.innerText="所持金: "+Math.floor(money)+"円";
  hatCount.innerText=Math.floor(hats);
  priceEl.innerText=price;
  worker.innerText=workers;
  workerLvEl.innerText=workerLv;
  factory.innerText=factories;
}

function save(){
  localStorage.setItem("save",JSON.stringify({money,hats,price,workers,workerLv,factories}));
}

window.onload=()=>{
  let s=localStorage.getItem("save");
  if(s){
    let d=JSON.parse(s);
    money=d.money;hats=d.hats;price=d.price;
    workers=d.workers;workerLv=d.workerLv;factories=d.factories;
  }
  update();
};

const moneyEl=document.getElementById("money");
const hatCount=document.getElementById("hatCount");
const priceEl=document.getElementById("price");
const worker=document.getElementById("worker");
const workerLvEl=document.getElementById("workerLv");
const factory=document.getElementById("factory");
</script>

</body>
</html>
